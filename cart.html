<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troli Saya</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding-bottom:100px;
}

.header{
    background:linear-gradient(180deg,#4b0000,#7a0000);
    color:white;
    padding:20px;
    text-align:center;
}

.cart-container{
    padding:15px;
}

.cart-item{
    background:#fff;
    border-radius:12px;
    padding:10px;
    margin-bottom:15px;
    display:flex;
    gap:10px;
    align-items:center;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.cart-item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}

.info{
    flex:1;
}

.info h3{
    font-size:18px;
    margin-bottom:8px;
}

.price{
    color:#7a0000;
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.qty-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.qty-btn{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#d4a12a;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.qty-text{
    min-width:20px;
    text-align:center;
    font-size:18px;
}

.hapus{
    border:none;
    background:none;
    color:#7a0000;
    font-size:20px;
    cursor:pointer;
}

.summary{
    background:#fff;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.summary h3{
    margin-bottom:15px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.total-bayar{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
    font-size:22px;
    color:#7a0000;
    font-weight:bold;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    padding:15px;
    margin-top:15px;
    background:#d4a12a;
    color:white;
    text-decoration:none;
    border-radius:25px;
}

.empty-cart{
    background:#fff;
    padding:50px 20px;
    text-align:center;
    border-radius:15px;
}

.empty-cart .icon{
    font-size:60px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#4b0000;
    display:flex;
    justify-content:space-around;
    padding:15px;
}

.bottom-nav a{
    color:#d4a12a;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
    <h2>Troli Saya</h2>
</div>

<div class="cart-container" id="cart">

</div>

<div id="summary">

</div>

<div class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="kategori.html">Semua Produk</a>
    <a href="cart.html">Troli</a>
    <a href="history.html">Pesanan</a>
    <a href="profile.html">Profil</a>
</div>

<script src="cart.js"></script>

</body>
</html>
