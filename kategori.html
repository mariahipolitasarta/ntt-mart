<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kategori Produk - NTT Mart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#f5f5f5;
    padding-bottom:80px;
}
.header{
    background:linear-gradient(180deg,#4b0000,#7a0000);
    padding:20px;
    color:white;
}
.logo-area{
    display:flex;
    align-items:center;
    gap:10px;
}
.logo-area img{
    width:45px;
}
.title{
    font-size:24px;
    font-weight:bold;
}
.tagline{
    font-size:12px;
    color:#d4a12a;
}
.search{
    margin-top:15px;
}
.search input{
    width:100%;
    padding:12px 18px;
    border:none;
    border-radius:25px;
}
.section-title{
    margin:15px;
    font-size:20px;
    font-weight:bold;
    color:#4b0000;
}
.kategori-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:15px;
}
.card-produk{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.card-produk img{
    width:100%;
    height:180px;
    object-fit:cover;
}
.card-body{
    padding:12px;
}
.card-body h4{
    margin-bottom:10px;
}
.harga{
    color:#7a0000;
    font-weight:bold;
    margin-bottom:12px;
}
.btn-tambah{
    display:block;
    text-align:center;
    background:#d4a12a;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:25px;
}
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:60px;
    background:#4b0000;
    display:flex;
    justify-content:space-around;
    align-items:center;
}
.bottom-nav a{
    color:#d4a12a;
    text-decoration:none;
    font-weight:bold;
}
.bottom-nav .active{
    color:#ffd700;
}
</style>

</head>
<body>

<div class="header">
    <div class="logo-area">
        <img src="img/logo.png" alt="Logo">
        <div>
            <div class="title">NTT MART DIGITAL</div>
            <div class="tagline">The Soul Of East Nusa In Your Hand</div>
        </div>
    </div>

    <div class="search">
        <input type="text" placeholder="Cari Produk...">
    </div>
</div>

<div class="section-title">
    Semua Produk
</div>

<div class="kategori-grid">

    <div class="card-produk">
        <img src="img/kopi.jpg" alt="Kopi Flores">
        <div class="card-body">
            <h4>Kopi Flores</h4>
            <div class="harga">Rp 75.000</div>

            <a href="#" class="btn-tambah"
               onclick="tambah(1); return false;">
                Tambah
            </a>

        </div>
    </div>

    <div class="card-produk">
        <img src="img/tenun.jpg" alt="Tenun Ikat">
        <div class="card-body">
            <h4>Tenun Ikat</h4>
            <div class="harga">Rp 350.000</div>

            <a href="#" class="btn-tambah"
               onclick="tambah(2); return false;">
                Tambah
            </a>

        </div>
    </div>

    <div class="card-produk">
        <img src="img/selendang.png" alt="Selendang Tenun">
        <div class="card-body">
            <h4>Selendang Tenun</h4>
            <div class="harga">Rp 180.000</div>

            <a href="#" class="btn-tambah"
               onclick="tambah(3); return false;">
                Tambah
            </a>

        </div>
    </div>

    <div class="card-produk">
        <img src="img/nagekeo.jpg" alt="Kopi Nagekeo">
        <div class="card-body">
            <h4>Kopi Nagekeo</h4>
            <div class="harga">Rp 65.000</div>

            <a href="#" class="btn-tambah"
               onclick="tambah(4); return false;">
                Tambah
            </a>

        </div>
    </div>

</div>
<div class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="kategori.html" class="active">Semua Produk</a>
    <a href="cart.html">Troli</a>
    <a href="history.html">Pesanan</a>
    <a href="profile.html">Profil</a>
</div>
<script src="cart.js"></script>
</body>
</html>
