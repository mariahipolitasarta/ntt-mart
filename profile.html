<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Saya</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding-bottom:90px;
}

.header{
    background:linear-gradient(180deg,#4b0000,#7a0000);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    padding:15px;
}

.profile-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.profile-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#d4a12a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin:auto;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#555;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    font-size:15px;
}

textarea{
    resize:none;
    height:100px;
}

.btn{
    width:100%;
    border:none;
    background:#d4a12a;
    color:white;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.logout{
    display:block;
    text-align:center;
    background:#7a0000;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#4b0000;
    display:flex;
    justify-content:space-around;
    padding:15px;
}

.bottom-nav a{
    color:#d4a12a;
    text-decoration:none;
    font-weight:bold;
}

.active{
    color:white !important;
}

</style>

</head>
<body>

<div class="header">
    <h2>Profil Saya</h2>
</div>

<div class="container">

    <div class="profile-card">

        <div class="profile-icon">
            👤
        </div>

        <label>Nama Lengkap</label>
        <input type="text" id="nama">

        <label>No Telepon</label>
        <input type="text" id="telepon">

        <label>Alamat</label>
        <textarea id="alamat"></textarea>

        <button class="btn" onclick="simpanProfil()">
            Simpan Perubahan
        </button>

        <a href="index.html" class="logout" onclick="logout()">
            Logout
        </a>

    </div>

</div>

<div class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="kategori.html">Semua Produk</a>
    <a href="cart.html">Troli</a>
    <a href="history.html">Pesanan</a>
    <a href="profile.html" class="active">Profil</a>
</div>

<script>

// Ambil data dari localStorage
let user = JSON.parse(localStorage.getItem("user"));

if(user){

    document.getElementById("nama").value = user.nama || "";
    document.getElementById("telepon").value = user.telepon || "";
    document.getElementById("alamat").value = user.alamat || "";

}

// Simpan perubahan profil
function simpanProfil(){

    const userBaru = {

        nama: document.getElementById("nama").value,
        telepon: document.getElementById("telepon").value,
        alamat: document.getElementById("alamat").value

    };

    localStorage.setItem("user", JSON.stringify(userBaru));

    alert("Profil berhasil diperbarui!");

}

// Logout
function logout(){

    localStorage.removeItem("user");

}

</script>

</body>
</html>
